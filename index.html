<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>麻雀成績計算</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-labelledby="app-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">Mahjong Result Calculator</p>
            <h1 id="app-title">麻雀成績計算</h1>
          </div>
          <button id="reset-button" class="ghost-button" type="button">初期化</button>
        </header>

        <section class="settings" aria-label="計算設定">
          <div class="mode-switch" role="group" aria-label="人数">
            <button class="mode-button active" type="button" data-mode="4">4麻</button>
            <button class="mode-button" type="button" data-mode="3">3麻</button>
          </div>

          <label>
            配給原点
            <input id="start-score" type="number" step="1000" min="0">
          </label>
          <label>
            返し点
            <input id="return-score" type="number" step="1000" min="0">
          </label>
          <label>
            オカ
            <input id="oka" type="number" step="1">
          </label>
        </section>

        <section class="main-grid">
          <section class="entry-panel" aria-label="結果入力">
            <div class="section-title">
              <h2>対局結果</h2>
              <span id="score-total">合計 100000</span>
            </div>

            <div id="player-inputs" class="player-inputs"></div>

            <div class="section-title uma-title">
              <h2>順位ウマ</h2>
              <span>1位から順に入力</span>
            </div>
            <div id="uma-inputs" class="uma-inputs"></div>

            <button id="save-result" class="primary-button" type="button">この結果を記録</button>
          </section>

          <section class="result-panel" aria-label="計算結果">
            <div class="section-title">
              <h2>ポイント</h2>
              <span id="point-total">合計 0.0</span>
            </div>
            <div id="result-list" class="result-list"></div>
          </section>
        </section>

        <section class="history-panel" aria-label="記録">
          <div class="section-title">
            <h2>記録</h2>
            <button id="clear-history" class="ghost-button small-button" type="button">記録を削除</button>
          </div>
          <ol id="history-list" class="history-list"></ol>
          <p id="empty-history" class="empty-history">まだ記録がありません。</p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
