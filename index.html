<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>&#40635;&#38592;&#25104;&#32318;&#35336;&#31639;</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="app">
      <section class="workspace" aria-labelledby="app-title">
        <header class="hero">
          <div class="hero-copy">
            <p class="eyebrow">Mahjong Result Calculator</p>
            <h1 id="app-title">&#40635;&#38592;&#25104;&#32318;&#35336;&#31639;</h1>
            <p class="lead">&#21322;&#33624;&#12372;&#12392;&#12398;&#32080;&#26524;&#12392;&#26412;&#26085;&#12398;&#21512;&#35336;&#12434;&#12377;&#12387;&#12365;&#12426;&#35352;&#37682;&#12290;</p>
          </div>
          <div class="tile-rail" aria-hidden="true">
            <span>&#26481;</span>
            <span>&#21335;</span>
            <span>&#35199;</span>
            <span>&#21271;</span>
            <span>&#30333;</span>
            <span>&#30332;</span>
            <span>&#20013;</span>
          </div>
          <button id="reset-button" class="ghost-button" type="button">&#21021;&#26399;&#21270;</button>
        </header>

        <section class="settings" aria-label="Basic settings">
          <div class="setting-group">
            <span class="setting-label">&#24418;&#24335;</span>
            <div class="button-group" role="group" aria-label="Format">
              <button class="format-button active" type="button" data-format="normal">&#36890;&#24120;</button>
              <button class="format-button" type="button" data-format="tournament">&#22823;&#20250;</button>
            </div>
          </div>

          <div class="setting-group">
            <span class="setting-label">&#21331;&#20154;&#25968;</span>
            <div class="button-group" role="group" aria-label="Table size">
              <button class="table-button active" type="button" data-table-size="4">4&#40635;</button>
              <button class="table-button" type="button" data-table-size="3">3&#40635;</button>
            </div>
          </div>

          <label>
            &#37197;&#32102;&#21407;&#28857;
            <input id="start-score" type="number" min="0" step="1000">
          </label>
          <label>
            &#36820;&#12375;&#28857;
            <input id="return-score" type="number" min="0" step="1000">
          </label>
          <label>
            &#33258;&#21205;&#12458;&#12459;
            <output id="oka-output">+20.0</output>
          </label>
        </section>

        <section id="tournament-panel" class="tournament-panel hidden" aria-label="Tournament players">
          <div class="section-title">
            <h2>&#22823;&#20250;&#21442;&#21152;&#32773;</h2>
            <label class="compact-label">
              &#20154;&#25968;
              <input id="participant-count" type="number" min="5" max="32" step="1">
            </label>
          </div>
          <div id="roster-list" class="roster-list"></div>
        </section>

        <section class="main-grid">
          <section class="entry-panel" aria-label="Game result input">
            <div class="section-title">
              <h2>&#21322;&#33624;&#32080;&#26524;</h2>
              <span id="score-total">&#20837;&#21147;&#21512;&#35336; 100000 / &#22522;&#28310; 100000</span>
            </div>

            <div id="seat-inputs" class="seat-inputs"></div>

            <div class="section-title uma-title">
              <h2>&#38918;&#20301;&#12454;&#12510;</h2>
              <span>1&#20301;&#12363;&#12425;&#38918;&#12395;&#20837;&#21147;</span>
            </div>
            <div id="uma-inputs" class="uma-inputs"></div>

            <button id="save-result" class="primary-button" type="button">&#12371;&#12398;&#21322;&#33624;&#12434;&#35352;&#37682;</button>
          </section>

          <section class="result-panel" aria-label="Calculated result">
            <div class="section-title">
              <h2>&#20170;&#22238;&#12398;&#12509;&#12452;&#12531;&#12488;</h2>
              <span id="point-total">&#21512;&#35336; 0.0</span>
            </div>
            <div id="result-list" class="result-list"></div>
          </section>
        </section>

        <section class="summary-panel" aria-label="Daily total">
          <div class="section-title">
            <h2>&#26412;&#26085;&#12398;&#21512;&#35336;</h2>
            <span id="game-count">0&#21322;&#33624;</span>
          </div>
          <div id="summary-list" class="summary-list"></div>
          <p id="empty-summary" class="empty-state">&#21322;&#33624;&#12434;&#35352;&#37682;&#12377;&#12427;&#12392;&#21512;&#35336;&#12509;&#12452;&#12531;&#12488;&#12364;&#20986;&#12414;&#12377;&#12290;</p>
        </section>

        <section class="history-panel" aria-label="History">
          <div class="section-title">
            <h2>&#35352;&#37682;</h2>
            <button id="clear-history" class="ghost-button small-button" type="button">&#35352;&#37682;&#12434;&#21066;&#38500;</button>
          </div>
          <ol id="history-list" class="history-list"></ol>
          <p id="empty-history" class="empty-state">&#12414;&#12384;&#35352;&#37682;&#12364;&#12354;&#12426;&#12414;&#12379;&#12435;&#12290;</p>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
